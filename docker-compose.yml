services:
  backend:
    build: ./backend
    container_name: helpdesk-backend
    ports:
      - "8010:8010"
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
      - ./backend/outputs:/app/outputs
      # Si quieres acceder al NAS desde Docker, mapea la ruta aquí:
      # - //nas1/nsi/Programas/HelpDeskManagerApp:/nas_app
    environment:
      - NAS_APP_DIR=${NAS_APP_DIR:-/nas_app}
      - DATABASE_URL=postgresql://neondb_owner:npg_TF7LyjxW6kEO@ep-icy-smoke-adpxoqpt.c-2.us-east-1.aws.neon.tech/neondb?sslmode=require
      - PYTHONUNBUFFERED=1
    command: uvicorn main:app --host 0.0.0.0 --port 8010 --reload
    restart: always

  frontend:
    build: ./frontend
    container_name: helpdesk-frontend
    ports:
      - "3010:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8010
    command: npm run dev
    depends_on:
      - backend
    restart: always
