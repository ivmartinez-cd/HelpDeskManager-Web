name: Build & Deploy Backend

on:
  push:
    branches:
      - main

env:
  IMAGE: ghcr.io/ivmartinez-cd/helpdeskmanager-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 5m
          script: |
            cd /home/ivmartinez_cd/HelpDeskManager-Web
            git checkout main
            git pull origin main
            echo "${{ secrets.GHCR_PAT }}" | sudo docker login ghcr.io -u ivmartinez-cd --password-stdin
            sudo docker pull ghcr.io/ivmartinez-cd/helpdeskmanager-backend:latest
            sudo docker compose up -d backend
